name: Docker Release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: alantoch/pihole-exporter

jobs:
  docker-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate metrics from latest Pi-hole OpenAPI spec
        run: go generate ./...

      - name: Read compiled Pi-hole API version
        id: version
        run: |
          version="$(sed -n 's/^const CompiledPiHoleAPIVersion = "\(.*\)"$/\1/p' pkg/pihole/metrics_gen.go)"
          if [ -z "$version" ]; then
            echo "failed to read CompiledPiHoleAPIVersion from pkg/pihole/metrics_gen.go" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Pi-hole API version: $version"

      - name: Check Docker Hub version tag
        id: docker_tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          status="$(curl -fsS -o /dev/null -w '%{http_code}' "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${VERSION}" || true)"
          if [ "$status" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Docker tag ${IMAGE_NAME}:${VERSION} already exists; skipping build."
            exit 0
          fi

          if [ "$status" != "404" ]; then
            echo "unexpected Docker Hub API status while checking ${IMAGE_NAME}:${VERSION}: $status" >&2
            exit 1
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Docker tag ${IMAGE_NAME}:${VERSION} does not exist; building and pushing."

      - name: Set up Docker Buildx
        if: steps.docker_tag.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.docker_tag.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.docker_tag.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
